                                id="ending-yr"
                                name="yr2"
                                type="number"
                                placeholder="eg.. 2025"
                            />
                        </fieldset>
                        <fieldset>
                            <label for="notes">Additional notes</label>
                            <textarea
                                cols="30"
                                rows="10"
                                name="notes"
                                id="notes"
                                placeholder="Whats the numbers of pi?"
